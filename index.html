<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yadidya Musicals | Equipping Young Musicians</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body {
            font-family:'Inter',sans-serif;
            background:#fff;  /* White background */
            color:#222;
            overflow-x:hidden;
            line-height:1.8
        }
        
        /* Ocean Blue Header */
        header{background:linear-gradient(135deg,#006994 0%,#00a8cc 100%);color:#fff;text-align:center;padding:80px 20px;position:relative;box-shadow:0 8px 30px rgba(0,0,0,0.3);overflow:hidden}
        header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,0.1) 0%,transparent 70%);animation:headerPulse 15s ease-in-out infinite}
        @keyframes headerPulse{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(5%,5%) scale(1.1)}}
        
        header img{width:160px;height:auto;margin-bottom:25px;transition:all 0.6s ease;filter:drop-shadow(0 6px 12px rgba(0,0,0,0.3));position:relative;z-index:2}
        header img:hover{transform:scale(1.15) rotate(5deg)}
        
        header h1{font-family:'Poppins',sans-serif;font-weight:700;font-size:3.5em;margin:0;letter-spacing:2px;text-shadow:3px 3px 6px rgba(0,0,0,0.3);position:relative;z-index:2}
        header p{font-size:1.4em;color:#e0f7ff;margin-top:15px;font-weight:500;letter-spacing:1px;position:relative;z-index:2}
        
        /* Teal Navigation */
        nav{background:#0d2b3e;backdrop-filter:blur(15px);display:flex;justify-content:center;align-items:center;gap:15px;padding:20px 30px;position:sticky;top:0;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,0.3);border-bottom:3px solid #00d9ff;flex-wrap:wrap}
        nav a{color:#ffffff;text-decoration:none;font-weight:600;font-family:'Poppins',sans-serif;transition:all 0.3s ease;position:relative;padding:12px 24px;border-radius:25px;font-size:0.95em;letter-spacing:0.5px;white-space:nowrap;background:transparent;border:2px solid transparent}
        nav a:hover{color:#fff;background:#00d9ff;border-color:#00d9ff;transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,217,255,0.5)}
        nav a.active{background:#00a8cc;color:#fff;box-shadow:0 4px 15px rgba(0,168,204,0.4)}
        
        /* Sections */
        section{padding:60px 20px;max-width:1200px;margin:80px auto;background:transparent;display:none;animation:fadeInUp 0.8s ease}
        section.active{display:block}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
        
        /* Headings */
        h2{text-align:center;color:#00d9ff;margin-bottom:20px;font-family:'Poppins',sans-serif;font-weight:700;font-size:2.8em;position:relative;display:inline-block;width:100%;letter-spacing:1px}
        h2::after{content:'';position:absolute;bottom:-15px;left:50%;transform:translateX(-50%);width:100px;height:5px;background:linear-gradient(90deg,#00a8cc,#00d9ff);border-radius:3px}
        
        h3{color:#00d9ff;font-size:1.6em;margin-bottom:20px;font-family:'Poppins',sans-serif;font-weight:600;text-align:center}
        
        p{text-align:center;line-height:2;color:#222;font-size:1.15em;font-weight:400}
        
        /* Content Box */
        .content-box,
        .form-container,
        .welcome-box,
        .instructor-card,
        .feature-card,
        .gallery-item,
        .contact-info {
            background:#b8860b !important;
            color:#fff !important;
            border:none !important;
            box-shadow:0 10px 40px rgba(184,134,11,0.13);
        }
        .content-box p,
        .welcome-box p,
        .instructor-info p,
        .feature-card p,
        .form-container p,
        .contact-info p {
            color:#fff !important;
        }
        /* Instructor Photos etc. remain unchanged */

        /* Learn More Badge & Buttons */
        .learn-more-badge,
        .button-accent {
            background: #fff;
            color: #b8860b;
            border-radius: 20px;
            font-weight: 600;
            border: 2px solid #b8860b;
            transition: background 0.2s,color 0.2s;
            padding:8px 20px;
        }
        .learn-more-badge:hover,
        .button-accent:hover {
            background: #b8860b;
            color: #fff;
        }
        /* Keep the rest of your styles as-is */

        /* Navigation Hint */
        .nav-hint{text-align:center;color:#00d9ff;font-size:1.1em;margin-top:30px;font-weight:600;animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
        
        /* Mobile Responsive */
        @media (max-width:768px){
            header{padding:60px 20px}
            header img{width:120px}
            header h1{font-size:2.2em}
            header p{font-size:1.1em}
            nav{gap:10px;padding:15px 20px}
            nav a{padding:10px 18px;font-size:0.9em}
            section{padding:50px 20px}
            h2{font-size:2em;margin-bottom:15px}
            h2::after{width:70px;height:4px}
            .content-box{padding:30px 25px}
            .instructors-container{grid-template-columns:1fr;gap:30px}
            .instructor-photo-wrapper{width:170px;height:170px}
            .features-grid{grid-template-columns:1fr;gap:25px}
            .feature-card{padding:35px 25px}
            .form-container{padding:20px}
            .gallery{grid-template-columns:1fr;gap:20px}
            .gallery img{height:220px}
            footer{padding:40px 20px}
        }
        
        @media (max-width:480px){
            header h1{font-size:1.8em}
            header p{font-size:1em}
            header img{width:100px}
            nav{gap:8px;padding:12px 15px}
            nav a{padding:8px 14px;font-size:0.85em}
            section{padding:40px 15px}
            h2{font-size:1.6em}
            .content-box{padding:25px 20px}
            .instructor-photo-wrapper{width:150px;height:150px}
            .contact-info p{padding:20px 20px;font-size:1em}
            footer .footer-logo{font-size:1.4em}
        }
        /* Hamburger Menu Icon */
.menu-icon {
    display: none;
    flex-direction: column;
    cursor: pointer;
    padding: 10px;
    z-index: 1001;
}

.menu-icon span {
    width: 30px;
    height: 3px;
    background: #00D9FF;
    margin: 4px 0;
    transition: 0.3s;
    border-radius: 3px;
}

/* Show menu icon on mobile */
@media (max-width: 768px) {
    .menu-icon {
        display: flex;
    }
    
    nav {
        flex-direction: column;
        align-items: flex-start;
    }
    
    nav a {
        display: none;
        width: 100%;
    }
    
    nav.active a {
        display: block;
    }
}
        .footer-logo {
    height: 80px;
    width: auto;
    margin-bottom: 15px;
}
    </style>
</head>
<body>
